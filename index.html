<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Life Tracker</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: #030712; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ROUTINE_ITEMS = ["Bath", "Breakfast", "Lunch", "Dinner"];
    const TABS = ["📚 Upskill", "⏳ Wasted", "😴 Sleep", "🔁 Routine", "📊 Summary"];

    const minToHM = m => {
      const h = Math.floor(m / 60);
      const mn = m % 60;
      return h > 0 ? `${h}h ${mn}m` : `${mn}m`;
    };

    const fmtDate = d => d.toISOString().split("T")[0];

    const defaultData = () => ({
      upskilling: [],
      wasted: [],
      sleep: { sleepTime: "", wakeTime: "", duration: 0 },
      routine: { Bath: 0, Breakfast: 0, Lunch: 0, Dinner: 0 },
      others: []
    });

    const storage = {
      get: key => {
        try { return JSON.parse(localStorage.getItem(key)); }
        catch { return null; }
      },
      set: (key, val) => {
        try { localStorage.setItem(key, JSON.stringify(val)); }
        catch {}
      }
    };

    function App() {
      const [date, setDate] = useState(new Date());
      const [data, setData] = useState(null);
      const [tab, setTab] = useState(0);

      const key = "tracker_" + fmtDate(date);

      useEffect(() => {
        const saved = storage.get(key);
        setData(saved || defaultData());
      }, [key]);

      const save = d => {
        setData(d);
        storage.set(key, d);
      };

      if (!data) return <div className="text-white p-10">Loading...</div>;

      return (
        <div className="p-4 text-white">
          <h1 className="text-xl mb-4">Daily Life Tracker</h1>

          <div className="flex gap-2 mb-4">
            {TABS.map((t, i) => (
              <button key={i} onClick={() => setTab(i)}
                className={tab === i ? "bg-indigo-600 px-3 py-1 rounded" : "bg-gray-700 px-3 py-1 rounded"}>
                {t}
              </button>
            ))}
          </div>

          {tab === 0 && <Upskill data={data} save={save} />}
          {tab === 1 && <Wasted data={data} save={save} />}
          {tab === 2 && <Sleep data={data} save={save} />}
          {tab === 3 && <Routine data={data} save={save} />}
          {tab === 4 && <Summary data={data} />}
        </div>
      );
    }

    function Upskill({ data, save }) {
      const [val, setVal] = useState("");

      return (
        <div>
          <input value={val} onChange={e => setVal(e.target.value)} className="text-black px-2" />
          <button onClick={() => {
            save({ ...data, upskilling: [...data.upskilling, val] });
            setVal("");
          }}>Add</button>

          <ul>
            {data.upskilling.map((i, idx) => <li key={idx}>{i}</li>)}
          </ul>
        </div>
      );
    }

    function Wasted({ data, save }) {
      return <div>Wasted tab</div>;
    }

    function Sleep({ data, save }) {
      return <div>Sleep tab</div>;
    }

    function Routine({ data, save }) {
      return <div>Routine tab</div>;
    }

    function Summary({ data }) {
      return <div>Summary tab (chart removed)</div>;
    }

    const root = document.getElementById("root");
    ReactDOM.createRoot(root).render(<App />);
  </script>
</body>
</html>
